<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Scheduler</title>
    <link rel="icon" href="/ai-scheduler/assets/favicon-BexCrnml.svg" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      #root {
        min-height: 100vh;
      }
      .error-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
      }
      .error-box {
        background: #1f2937;
        padding: 40px;
        border-radius: 12px;
        max-width: 500px;
      }
      .error-box h1 {
        margin-top: 0;
        color: #ef4444;
      }
      .error-box p {
        color: #9ca3af;
        line-height: 1.6;
      }
      .error-box code {
        background: #0f172a;
        padding: 8px 12px;
        border-radius: 4px;
        display: block;
        text-align: left;
        overflow-x: auto;
        font-size: 12px;
        margin: 10px 0;
      }
    </style>
    <script type="module" crossorigin src="/ai-scheduler/assets/index-Cd9CbNQc.js"></script>
    <link rel="stylesheet" crossorigin href="/ai-scheduler/assets/index-D2f3VLuq.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Fallback error handler
      window.addEventListener('error', (event) => {
        const root = document.getElementById('root');
        if (root.innerHTML === '') {
          root.innerHTML = `
            <div class="error-container">
              <div class="error-box">
                <h1>⚠️ App Error</h1>
                <p>The app failed to load. This might be a network issue or build problem.</p>
                <code>${event.message}</code>
                <p style="margin-top: 20px; font-size: 12px;">
                  Try refreshing the page or checking your internet connection.
                </p>
              </div>
            </div>
          `;
        }
      });
    </script>
  </body>
</html>
